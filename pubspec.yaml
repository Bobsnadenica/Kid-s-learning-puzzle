name: animal_puzzle_game
description: A bilingual kids matching game for learning words in English and Bulgarian.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.12.0
  shared_preferences: ^2.3.0
  lottie: ^3.1.0
  flutter_tts: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/logo.png"
  web:
    generate: true
    image_path: "assets/logo/logo.png"
  macos:
    generate: true
    image_path: "assets/logo/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animals/
    - assets/animals_emoji/
    - assets/fruits/
    - assets/fruits_emoji/
    - assets/backgrounds/
    - assets/professions/
    - assets/vehicles/
    - assets/ocean/
    - assets/lottie/
    - assets/logo/
